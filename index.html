<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance Punch In / Punch Out Tracker</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/plugins/monthSelect/style.css">
<style>
body{font-family:Segoe UI,Tahoma,sans-serif;background:linear-gradient(#e3f2fd,#fff);margin:0;padding:20px}
.container{max-width:1050px;margin:auto;background:#fff;border-radius:12px;box-shadow:0 6px 12px rgba(0,0,0,.15);padding:20px}
h2{text-align:center;color:#0d47a1}
.row{display:grid;grid-template-columns:260px 1fr;gap:10px;margin-bottom:12px;align-items:center}
input,select,button{height:40px;font-size:14px;width:100%;box-sizing:border-box;padding:0 10px;border-radius:6px;border:1px solid #ccc;outline:none}
button{background:#1976d2;color:#fff;border:none;border-radius:6px;cursor:pointer}
button:hover{background:#1565c0}
.table-wrap{overflow-x:auto;margin-top:20px}
table{border-collapse:collapse;width:100%}
th,td{border:1px solid #ccc;padding:8px;text-align:center;font-size:13px}
th{background:#e3f2fd}
.status-compliant{background:#e8f5e9}
.status-noncompliant{background:#ffebee}
.status-neutral{background:#eceff1}
footer{text-align:center;margin-top:20px;color:#607d8b;font-size:13px}
.month-separator{background:#f1f8ff;padding:10px;border-radius:8px;margin-bottom:15px;font-size:13px}
.time-wrapper{position:relative;width:100%;height:40px}
.time-input{width:100%;height:40px;padding:0 40px 0 10px;box-sizing:border-box}
.time-icon{position:absolute;right:10px;top:50%;transform:translateY(-50%);width:20px;height:20px;cursor:pointer;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' fill='none' stroke='%23666' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' viewBox='0 0 24 24'><circle cx='12' cy='12' r='9'/><path d='M12 7v5l3 2'/></svg>");background-size:18px;background-repeat:no-repeat}
</style>
</head>
<body>
<div class="container">
<h2>Monthly Attendance Punch Tracker</h2>

<div class="row">
<label>Employee Type</label>
<select id="empType">
<option value="faculty">Faculty</option>
<option value="staff">Staff</option>
</select>
</div>

<div class="row">
<label>Filter Month</label>
<input type="text" id="monthFilter" placeholder="Select Month">
</div>

<div id="monthlySummary" class="month-separator" style="display:none; position:relative;">
<button id="closeSummary" style="position:absolute; top:5px; right:8px; height:22px; width:22px; padding:0; font-size:14px; line-height:20px; background:#1565c0; border-radius:50%;">×</button>
<div id="summaryContent" style="padding-right:25px;"></div>
</div>

<div class="row">
<label>Date</label>
<input type="text" id="datePicker">
</div>

<div class="row">
<label>Punch-In Time</label>
<div class="time-wrapper">
<input type="text" id="punchIn" class="time-input" placeholder="__:__">
<div class="time-icon" id="inIcon"></div>
</div>
</div>

<div class="row">
<label>Punch-Out Time</label>
<div class="time-wrapper">
<input type="text" id="punchOut" class="time-input" placeholder="__:__">
<div class="time-icon" id="outIcon"></div>
</div>
</div>

<div class="row">
<label>Required Daily Hours</label>
<select id="requiredHours">
<option value="8.5">8h 30m (8.5 Hours - Standard Duty)</option>
<option value="8">8h 00m</option>
<option value="7.5">7h 30m</option>
<option value="7">7h 00m</option>
</select>
</div>

<div class="row">
<label>Special Leave</label>
<select id="specialLeave">
<option value="no">No</option>
<option value="yes">Yes</option>
</select>
</div>

<div class="row">
<label>Closed Holiday</label>
<select id="closedHoliday">
<option value="no">No</option>
<option value="yes">Yes</option>
</select>
</div>

<button id="saveBtn">Save Punch</button>

<div class="table-wrap">
<table id="recordsTable">
<thead>
<tr>
<th>Date</th><th>Emp</th><th>In</th><th>Out</th><th>Flags</th><th>Hours</th><th>Edit</th><th>Action</th><th>Status</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<footer>© <span id="yr"></span> Attendance Tracker. All rights reserved.</footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/plugins/monthSelect/index.js"></script>
<script>

// ===== Initialization =====
document.getElementById('yr').textContent = new Date().getFullYear();

flatpickr('#monthFilter',{
  plugins:[new monthSelectPlugin({shorthand:true,dateFormat:"Y-m",altFormat:"F Y"})]
});

flatpickr('#datePicker',{dateFormat:"Y-m-d",defaultDate:new Date()});

const punchInPicker = flatpickr('#punchIn',{enableTime:true,noCalendar:true,dateFormat:"h:i K",minuteIncrement:5,clickOpens:true,allowInput:true});
const punchOutPicker = flatpickr('#punchOut',{enableTime:true,noCalendar:true,dateFormat:"h:i K",minuteIncrement:5,clickOpens:true,allowInput:true});

document.getElementById('inIcon').onclick = () => punchInPicker.open();
document.getElementById('outIcon').onclick = () => punchOutPicker.open();

// ===== Core Logic =====
const STORAGE_KEY = 'attendance_records_v5';
let editModeDate = null;

function toMinutes(t){
  if(!t) return null;
  const d = new Date("1970-01-01 " + t);
  return d.getHours()*60 + d.getMinutes();
}

function isTimeComplete(v){
  return v && v.includes(':');
}

function evaluateAttendance(empType,inTime,outTime,isHoliday,isSpecial,date){
  if(isHoliday) return "Closed Holiday";
  if(isSpecial) return "Special Leave";
  if(!isTimeComplete(inTime) || !isTimeComplete(outTime)) return "Non-Compliant: Hours Short";

  const inMin = toMinutes(inTime);
  const outMin = toMinutes(outTime);
  const required = parseFloat(document.getElementById('requiredHours').value)*60;
  const worked = outMin - inMin;

  const PRESENCE_START = 9*60;
  const PRESENCE_END = 17*60 + 30;

  const late = inMin - PRESENCE_START;
  const early = PRESENCE_END - outMin;

  const monthKey = date.slice(0,7);
  const allRecords = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]')
        .filter(r=>r.date.startsWith(monthKey));

  const relaxationUsed = allRecords.filter(r=>
        r.status && r.status.includes('Relaxation Cap')
  ).length;

  // Early coming does NOT permit early leaving
  if(inMin < PRESENCE_START && outMin < PRESENCE_END){
    return "Non-Compliant: Early Coming Does Not Permit Early Leaving";
  }

  if(late>0 && early>0) return "Non-Compliant: Late + Early";

  // Grace (0–10 min late)
  if(late>0 && late<=10 && early<=0 && worked>=required){
    return "Compliant: Grace";
  }

  // Relaxation (max 2 per month, upto 1 hour late OR early)
  if((late>10 && late<=60 && early<=0) || (early>0 && early<=60 && late<=0)){
      if(relaxationUsed >= 2){
         return "Non-Compliant: Relaxation Cap Exceeded";
      }
      if(worked >= 7.5*60){
         return "Compliant: Relaxation Cap";
      }
  }

  if(worked < required) return "Non-Compliant: Hours Short";

  if(empType==='faculty'){
    if(inMin > 10*60+30) return "Non-Compliant: 10:30 A.M.—Faculty";
    if(late>0) return "Compliant: Late Compensation";
    return "Compliant";
  }

  if(empType==='staff'){
    if(inMin > 10*60) return "Non-Compliant: 30% Rule—Staff";
    if(inMin > 9*60+30) return "Non-Compliant: After 9:30 A.M.—Staff";
    if(late>0) return "Compliant: Late Compensation";
    return "Compliant";
  }

  return "Compliant";
}

function saveRecord(){
  const date = document.getElementById('datePicker').value;
  if(!date) return alert('Select date');

  const empType = document.getElementById('empType').value;
  const inTime = document.getElementById('punchIn').value;
  let outTime = document.getElementById('punchOut').value;
  const isHoliday = document.getElementById('closedHoliday').value==='yes';
  const isSpecial = document.getElementById('specialLeave').value==='yes';

  if(!isHoliday && !isSpecial && !isTimeComplete(inTime)){
    alert('Punch-In Time is mandatory');
    return;
  }

  let autoCalculated = false;

  if(!isHoliday && !isSpecial && !isTimeComplete(outTime)){
    const inMin = toMinutes(inTime);
    const required = parseFloat(document.getElementById('requiredHours').value)*60;
    const targetMin = inMin + required;
    const h = Math.floor(targetMin/60)%24;
    const m = targetMin%60;
    const d = new Date();
    d.setHours(h);
    d.setMinutes(m);
    outTime = d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
    document.getElementById('punchOut').value = outTime;
    autoCalculated = true;
  }

  let status = evaluateAttendance(empType,inTime,outTime,isHoliday,isSpecial,date);
  if(autoCalculated) status = 'Pending';

  let records = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  if(editModeDate) records = records.filter(r=>r.date!==editModeDate);
  records = records.filter(r=>r.date!==date);
  records.push({date,empType,inTime,outTime,status,autoCalculated});
  records.sort((a,b)=>a.date.localeCompare(b.date));
  localStorage.setItem(STORAGE_KEY,JSON.stringify(records));
  editModeDate = null;
  renderTable();
}

function renderTable(){
  const monthFilter = document.getElementById('monthFilter').value;
  const tbody = document.querySelector('#recordsTable tbody');
  const summaryBox = document.getElementById('monthlySummary');
  tbody.innerHTML='';

  let records = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');

  if(monthFilter){
    records = records.filter(r=>r.date.startsWith(monthFilter));
    summaryBox.style.display='block';
  } else {
    summaryBox.style.display='none';
  }

  records.forEach(r=>{
    const tr = document.createElement('tr');

    if(r.status==='Closed Holiday' || r.status==='Special Leave'){
      tr.className='status-neutral';
    } else if(r.status.startsWith('Non-Compliant')){
      tr.className='status-noncompliant';
    } else {
      tr.className='status-compliant';
    }

    const hours = (toMinutes(r.outTime)&&toMinutes(r.inTime)) ? ((toMinutes(r.outTime)-toMinutes(r.inTime))/60).toFixed(2) : '-';

    tr.innerHTML = `
      <td>${r.date}</td>
      <td>${r.empType}</td>
      <td>${r.inTime}</td>
      <td>${r.outTime}</td>
      <td>${r.autoCalculated ? 'Target Punch-Out' : '-'}</td>
      <td>${hours}</td>
      <td><button onclick="editRecord('${r.date}')">Edit</button></td>
      <td><button onclick="deleteRecord('${r.date}')">Delete</button></td>
      <td>${r.status}</td>
    `;

    tbody.appendChild(tr);
  });
}

function editRecord(d){
  const records = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  const r = records.find(x=>x.date===d);
  if(!r) return;
  document.getElementById('datePicker').value=r.date;
  document.getElementById('empType').value=r.empType;
  document.getElementById('punchIn').value=r.inTime;
  document.getElementById('punchOut').value=r.outTime;
  editModeDate=d;
}

function deleteRecord(d){
  if(!confirm('Delete record?')) return;
  let records = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  records = records.filter(r=>r.date!==d);
  localStorage.setItem(STORAGE_KEY,JSON.stringify(records));
  renderTable();
}

// ===== Event Listeners =====
document.getElementById('saveBtn').addEventListener('click',saveRecord);
document.getElementById('monthFilter').addEventListener('change',renderTable);
document.getElementById('closeSummary').addEventListener('click',()=>{
  document.getElementById('monthlySummary').style.display='none';
});

renderTable();

</script>
</body>
</html>
