<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance Punch In / Punch Out Tracker</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/plugins/monthSelect/style.css">

<style>
/* ================= UI STYLING SECTION ================= */
body{font-family:Segoe UI,Tahoma,sans-serif;background:linear-gradient(#e3f2fd,#fff);margin:0;padding:20px}
.container{max-width:1050px;margin:auto;background:#fff;border-radius:12px;box-shadow:0 6px 12px rgba(0,0,0,.15);padding:20px}
h2{text-align:center;color:#0d47a1}
.row{display:grid;grid-template-columns:260px 1fr;gap:10px;margin-bottom:12px;align-items:center}
input,select,button{height:40px;font-size:14px;width:100%;box-sizing:border-box;padding:0 10px;border-radius:6px;border:1px solid #ccc}
button{background:#1976d2;color:#fff;border:none;cursor:pointer}
button:hover{background:#1565c0}
.table-wrap{overflow-x:auto;margin-top:20px}
table{border-collapse:collapse;width:100%}
th,td{border:1px solid #ccc;padding:8px;text-align:center;font-size:13px}
th{background:#e3f2fd}
.status-compliant{background:#e8f5e9}
.status-noncompliant{background:#ffebee}
.status-neutral{background:#eceff1}
.status-pending{background:#ffeb3b}
#monthSummary{background:#e3f2fd;padding:12px 40px 12px 12px;border-radius:8px;margin-bottom:15px;font-size:14px;display:none;position:relative}
#summaryClose{position:absolute;top:8px;right:10px;background:#1976d2;color:#fff;border:none;border-radius:50%;width:22px;height:22px;font-size:12px;cursor:pointer}
.action-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:15px;margin-top:15px}
.dropdown{position:relative}
.dropdown-menu{display:none;position:absolute;width:100%;background:#fff;border:1px solid #ccc;z-index:10}
.dropdown-menu div{padding:8px;cursor:pointer}
.dropdown-menu div:hover{background:#f1f1f1}
</style>
</head>

<body>
<div class="container">
<h2>Monthly Attendance Punch Tracker</h2>

<!-- ================= UI CONTROLS SECTION ================= -->
<div class="row">
<label>Employee Type</label>
<select id="empType">
<option value="faculty">Faculty</option>
<option value="staff">Staff</option>
</select>
</div>

<div class="row">
<label>Filter Month</label>
<input type="text" id="monthFilter">
</div>

<div id="monthSummary"><button id="summaryClose">×</button></div>

<div class="row">
<label>Date</label>
<input type="text" id="datePicker">
</div>

<div class="row">
<label>Punch-In</label>
<input type="text" id="punchIn" autocomplete="off">
</div>

<div class="row">
<label>Punch-Out</label>
<input type="text" id="punchOut" autocomplete="off">
</div>

<div class="row">
<label>Required Daily Hours</label>
<select id="dailyHours">
<option value="8.5">8h 30m (8.5 Hours - Standard Duty)</option>
<option value="8">8h 00m</option>
<option value="7.5">7h 30m</option>
<option value="7">7h 00m</option>
</select>
</div>

<div class="row">
<label>Closed Holiday</label>
<select id="closedHoliday">
<option value="no">No</option>
<option value="yes">Yes</option>
</select>
</div>

<div class="row">
<label>Special Leave</label>
<select id="specialLeave">
<option value="no">No</option>
<option value="yes">Yes</option>
</select>
</div>

<button id="saveBtn">Save Punch</button>

<!-- ================= TABLE SECTION ================= -->
<div class="table-wrap">
<table id="recordsTable">
<thead>
<tr>
<th>Date</th>
<th>Emp</th>
<th>In</th>
<th>Out</th>
<th>Hours</th>
<th>Status</th>
<th>Reason</th>
<th>Edit</th>
<th>Action</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<div class="action-row">
<button id="importBtn">Import Report (CSV)</button>

<div class="dropdown">
<button id="exportBtn">Export Report (CSV) ▼</button>
<div id="exportMenu" class="dropdown-menu">
<div onclick="exportData('month')">Filter Month Data</div>
<div onclick="exportData('all')">Entire Data</div>
</div>
</div>

<div class="dropdown">
<button id="deleteBtn" style="background:#c62828">Delete Data ▼</button>
<div id="deleteMenu" class="dropdown-menu">
<div onclick="deleteData('month')">Filter Month Data</div>
<div onclick="deleteData('all')">Entire Data</div>
</div>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/plugins/monthSelect/index.js"></script>

<script>
/* ============================================================
   ================= UI INITIALIZATION SECTION =================
   (ONLY UI related bindings and pickers go here)
============================================================ */

const STORAGE_KEY='attendance_records_v16';
let editingDate = null; // Tracks if record is being edited

flatpickr('#monthFilter',{plugins:[new monthSelectPlugin({dateFormat:'Y-m'})]});
flatpickr('#datePicker',{dateFormat:'Y-m-d',defaultDate:new Date()});
flatpickr('#punchIn',{enableTime:true,noCalendar:true,dateFormat:'h:i K',defaultHour:9,defaultMinute:0,allowInput:true});
flatpickr('#punchOut',{enableTime:true,noCalendar:true,dateFormat:'h:i K',defaultHour:17,defaultMinute:30,allowInput:true});



/* ============================================================
   ================= RULE ENGINE SECTION =================
   (Attendance logic ONLY. No UI manipulation here.)
============================================================ */

/* ================= STRICT VALIDATION TEST HARNESS =================
   This section validates Faculty and Staff logic independently.
   It does NOT touch UI or Table code.
   Run manually using runAttendanceTests() from console.
==================================================================== */

function runAttendanceTests(){
    const testMonth='2099-01';
    localStorage.removeItem(STORAGE_KEY);

    const facultyTests=[
        {in:'09:00 AM',out:'05:30 PM',expect:'On-Time'},
        {in:'09:05 AM',out:'05:30 PM',expect:'Grace'},
        {in:'09:45 AM',out:'06:15 PM',expect:'Late Compensation'},
        {in:'10:00 AM',out:'05:30 PM',expect:'Semimonthly Relaxation'},
        {in:'10:45 AM',out:'05:30 PM',expect:'REJECT'}
    ];

    const staffTests=[
        {in:'09:00 AM',out:'05:30 PM',expect:'On-Time'},
        {in:'09:05 AM',out:'05:30 PM',expect:'Grace'},
        {in:'09:20 AM',out:'06:00 PM',expect:'Late Compensation-Type I'},
        {in:'09:45 AM',out:'06:30 PM',expect:'Late Compensation-Type II'},
        {in:'10:30 AM',out:'05:30 PM',expect:'REJECT'}
    ];

    console.group('FACULTY VALIDATION');
    facultyTests.forEach((t,i)=>{
        const res=evaluateAttendance('faculty',t.in,t.out,testMonth+'-'+String(i+1).padStart(2,'0'),false,false);
        console.log('Test',i+1,'Expected:',t.expect,'Got:',res.reason,res.reason===t.expect?'PASS':'FAIL');
    });
    console.groupEnd();

    console.group('STAFF VALIDATION');
    staffTests.forEach((t,i)=>{
        const res=evaluateAttendance('staff',t.in,t.out,testMonth+'-'+String(i+1).padStart(2,'0'),false,false);
        console.log('Test',i+1,'Expected:',t.expect,'Got:',res.reason,res.reason===t.expect?'PASS':'FAIL');
    });
    console.groupEnd();
}

/* ================= END TEST HARNESS ================= */

function toMinutes(t){if(!t)return 0;const d=new Date('1970-01-01 '+t);return d.getHours()*60+d.getMinutes();}

function evaluateFaculty(inMin,outMin,worked,relaxCount){
const officeStart=540, officeEnd=1050, relaxEarly=990;
if(inMin<=officeStart && outMin>=officeEnd) return {status:'Compliant',reason:'On-Time'};
if(inMin>officeStart && inMin<=550 && outMin>=officeEnd) return {status:'Compliant',reason:'Grace'};
if(relaxCount<2 && ((inMin<=600 && outMin>=officeEnd)||(inMin<=officeStart && outMin>=relaxEarly))) return {status:'Compliant',reason:'Semimonthly Relaxation'};
if(inMin>550 && inMin<=630 && worked>=510) return {status:'Compliant',reason:'Late Compensation'};
return {status:'Non-Compliant',reason:'REJECT'};
}

function evaluateStaff(inMin,outMin,worked,relaxCount){
const officeStart=540, officeEnd=1050, relaxEarly=990;
if(inMin<=officeStart && outMin>=officeEnd) return {status:'Compliant',reason:'On-Time'};
if(inMin>officeStart && inMin<=550 && outMin>=officeEnd) return {status:'Compliant',reason:'Grace'};
if(relaxCount<2 && ((inMin<=600 && outMin>=officeEnd)||(inMin<=officeStart && outMin>=relaxEarly))) return {status:'Compliant',reason:'Semimonthly Relaxation'};
if(inMin>550 && inMin<=570 && worked>=510) return {status:'Compliant',reason:'Late Compensation-Type I'};
if(inMin>570 && inMin<=600 && worked>=510) return {status:'Compliant',reason:'Late Compensation-Type II'};
return {status:'Non-Compliant',reason:'REJECT'};
}

function evaluateAttendance(emp,inTime,outTime,date,isHoliday,isSpecial){
if(isHoliday) return {status:'Compliant',reason:'Closed Holiday'};
if(isSpecial) return {status:'Compliant',reason:'Special Leave'};

const inMin=toMinutes(inTime);
const outMin=toMinutes(outTime);
const worked=outMin-inMin;
const month=date.slice(0,7);

// IMPORTANT: Relaxation must be applied in chronological order
let records=JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]')
    .filter(r=>r.date.startsWith(month))
    .sort((a,b)=>a.date.localeCompare(b.date));

let relaxCount=0;
records.forEach(r=>{
    if(r.reason==='Semimonthly Relaxation') relaxCount++;
});

if(emp==='faculty') return evaluateFaculty(inMin,outMin,worked,relaxCount);
if(emp==='staff') return evaluateStaff(inMin,outMin,worked,relaxCount);

return {status:'Non-Compliant',reason:'REJECT'};
}

/* ============================================================
   ================= TABLE & DATA SECTION =================
   (Rendering + Storage handling ONLY)
============================================================ */

function saveRecord(){
const date=datePicker.value;
const emp=empType.value;
const empLabel=empType.selectedOptions[0].text;
let inTime=punchIn.value;
let outTime=punchOut.value;
const isHoliday=closedHoliday.value==='yes';
const isSpecial=specialLeave.value==='yes';

if(!date){alert('Select Date');return;}

let records=JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');

// ===== Overwrite Logic =====
const existingRecord = records.find(r=>r.date===date);

// If editing mode is active → remove original record first
if(editingDate){
    records = records.filter(r=>r.date!==editingDate);

    // If user changed date AND another record exists on that new date → confirm overwrite
    if(editingDate!==date && existingRecord){
        if(!confirm('Another record exists for this date. Overwrite?')){
            // Restore original record if user cancels
            records.push(existingRecord);
            return;
        }
        records = records.filter(r=>r.date!==date);
    }
}
// If not editing but record already exists → confirm overwrite
else if(existingRecord){
    if(!confirm('Record exists for this date. Overwrite?')) return;
    records = records.filter(r=>r.date!==date);
}


if(!isHoliday && !isSpecial && !inTime){
alert('Punch-In Time is mandatory unless Closed Holiday or Special Leave is selected.');
return;
}

if(!isHoliday && !isSpecial && inTime && !outTime){
    // Save as Pending Punch-Out (retain Punch-In, allow later overwrite)
    records.push({
        date,
        empLabel,
        inTime,
        outTime:'',
        hours:0,
        status:'Non-Compliant',
        reason:'Pending Punch-Out'
    });
    localStorage.setItem(STORAGE_KEY,JSON.stringify(records));
    editingDate=null;
    renderTable(false);
    return;
}

const result=evaluateAttendance(emp,inTime,outTime,date,isHoliday,isSpecial);
const hours=isHoliday||isSpecial?0:((toMinutes(outTime)-toMinutes(inTime))/60).toFixed(2);
records.push({date,empLabel,inTime,outTime,hours,status:result.status,reason:result.reason});
localStorage.setItem(STORAGE_KEY,JSON.stringify(records));
editingDate=null; // reset editing mode after final save
renderTable(false);
}

function renderTable(showSummary=true){
const month=monthFilter.value;
const tbody=document.querySelector('#recordsTable tbody');
let records=JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]')
    .sort((a,b)=>a.date.localeCompare(b.date)); // Always sort globally by date

if(month) records=records.filter(r=>r.date.startsWith(month));
else records=records.filter(r=>r.date.startsWith(new Date().toISOString().slice(0,7)));

tbody.innerHTML='';
records.forEach(r=>{
const tr=document.createElement('tr');
if(r.status==='Compliant') tr.className='status-compliant';
if(r.status==='Non-Compliant') tr.className='status-noncompliant';
if(r.reason==='Pending Punch-Out') tr.className='status-pending';
if(r.reason==='Closed Holiday'||r.reason==='Special Leave') tr.className='status-neutral';
tr.innerHTML='<td>'+r.date+'</td><td>'+r.empLabel+'</td><td>'+r.inTime+'</td><td>'+r.outTime+'</td><td>'+(r.hours||0)+'</td><td>'+r.status+'</td><td>'+r.reason+'</td><td><button onclick="editRecord(\''+r.date+'\')">Edit</button></td><td><button onclick="deleteRecord(\''+r.date+'\')" style="background:#c62828">Delete</button></td>';
tbody.appendChild(tr);
});

if(showSummary && month){
    renderMonthSummary(month);
}else{
    document.getElementById('monthSummary').style.display='none';
}
}

function editRecord(date){
const records=JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');
const rec=records.find(r=>r.date===date);
if(!rec)return;

editingDate = date; // mark editing mode

datePicker.value=rec.date;
empType.value=rec.empLabel.toLowerCase();
punchIn.value=rec.inTime||'';
punchOut.value=rec.outTime||'';
closedHoliday.value=rec.reason==='Closed Holiday'?'yes':'no';
specialLeave.value=rec.reason==='Special Leave'?'yes':'no';
}

function deleteRecord(date){
if(!confirm('Delete record for '+date+'?'))return;
let records=JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');
records=records.filter(r=>r.date!==date);
localStorage.setItem(STORAGE_KEY,JSON.stringify(records));
renderTable();
}

// ===== Month Summary Function =====
function renderMonthSummary(month){
    const emp = empType.value;
    const allRecords = JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]')
        .filter(r => r.date.startsWith(month));

    const records = allRecords.filter(r => r.empLabel.toLowerCase() === emp);

    const total = records.length;
    const compliant = records.filter(r => r.status === 'Compliant').length;
    const noncompliant = records.filter(r => r.status === 'Non-Compliant').length;
    const grace = records.filter(r => r.reason === 'Grace').length;
    const relaxation = records.filter(r => r.reason === 'Semimonthly Relaxation').length;
    const pending = records.filter(r => r.reason === 'Pending Punch-Out').length;
    const holiday = records.filter(r => r.reason === 'Closed Holiday').length;
    const special = records.filter(r => r.reason === 'Special Leave').length;
    const reject = records.filter(r => r.reason === 'REJECT').length;

    const lateCompFaculty = records.filter(r => r.reason === 'Late Compensation').length;
    const lateCompTypeI = records.filter(r => r.reason === 'Late Compensation-Type I').length;
    const lateCompTypeII = records.filter(r => r.reason === 'Late Compensation-Type II').length;

    const summaryDiv = document.getElementById('monthSummary');

    let html = '<button id="summaryClose">×</button>' +
               '<b>' + month + '</b><br>' +
               'Total Records: ' + total + '<br>' +
               'Compliant: ' + compliant + '<br>' +
               'Non-Compliant: ' + noncompliant + '<br>' +
               'Grace: ' + grace + '<br>';

    if(emp === 'faculty'){
        html +=
        'Relaxation: ' + relaxation + '/2<br>' +
        'Late Compensation: ' + lateCompFaculty + '<br>' +
        'Pending Punch-Out: ' + pending + '<br>' +
        'Closed Holiday: ' + holiday + '<br>' +
        'Special Leave: ' + special + '<br>' +
        'Reject: ' + reject;
    }
    else{
        const workingDays = records.filter(r => r.reason !== 'Closed Holiday' && r.reason !== 'Special Leave').length;
        const ruleLimit = Math.floor(workingDays * 0.3);

        html +=
        'Relaxation Type I: ' + lateCompTypeI + '/2<br>' +
        'Relaxation Type II: ' + lateCompTypeII + '/' + ruleLimit + '<br>' +
        'Pending Punch-Out: ' + pending + '<br>' +
        'Closed Holiday: ' + holiday + '<br>' +
        'Special Leave: ' + special + '<br>' +
        'Reject: ' + reject;
    }

    summaryDiv.innerHTML = html;
    summaryDiv.style.display = 'block';
    document.getElementById('summaryClose').onclick = function(){
        summaryDiv.style.display = 'none';
    };
}

/* ================= EVENT BINDINGS ================= */
saveBtn.addEventListener('click',saveRecord);
monthFilter.addEventListener('change',()=>renderTable(true));
empType.addEventListener('change',()=>renderTable(true));

renderTable();
</script>
</body>
</html>
